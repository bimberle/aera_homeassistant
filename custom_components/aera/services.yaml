start_session:
  name: Start Session
  description: Start a timed fragrance session.
  target:
    entity:
      integration: aera
      domain: fan
  fields:
    duration:
      name: Duration
      description: Session duration
      required: true
      selector:
        select:
          options:
            - label: "2 hours"
              value: "2h"
            - label: "4 hours"
              value: "4h"
            - label: "8 hours"
              value: "8h"

stop_session:
  name: Stop Session
  description: Stop the current fragrance session.
  target:
    entity:
      integration: aera
      domain: fan

turn_on:
  name: Turn On
  description: Turn the diffuser on.
  target:
    entity:
      integration: aera
      domain: fan

turn_off:
  name: Turn Off
  description: Turn the diffuser off.
  target:
    entity:
      integration: aera
      domain: fan

set_intensity:
  name: Set Intensity
  description: Set the fragrance intensity level (1-10).
  target:
    entity:
      integration: aera
      domain: fan
  fields:
    intensity:
      name: Intensity
      description: Intensity level from 1 (lowest) to 10 (highest)
      required: true
      selector:
        number:
          min: 1
          max: 10
          step: 1
          mode: slider

set_fragrance:
  name: Set Fragrance
  description: Set the fragrance for aeraMini devices.
  target:
    entity:
      integration: aera
      domain: fan
  fields:
    fragrance_id:
      name: Fragrance ID
      description: The 3-letter fragrance identifier (e.g., "IDG" for Indigo)
      required: true
      selector:
        text:

set_room_name:
  name: Set Room Name
  description: Set the room name for an Aera device.
  target:
    entity:
      integration: aera
      domain: fan
  fields:
    room_name:
      name: Room Name
      description: The name of the room where the device is located
      required: true
      selector:
        text:

get_schedules:
  name: Get Schedules
  description: Get all schedules for an Aera device.
  target:
    entity:
      integration: aera
      domain: fan

create_schedule:
  name: Create Schedule
  description: Create a new schedule for an Aera device.
  target:
    entity:
      integration: aera
      domain: fan
  fields:
    schedule_name:
      name: Schedule Name
      description: Display name for the schedule
      required: true
      selector:
        text:
    start_time:
      name: Start Time
      description: Time when the schedule starts (HH:MM format)
      required: false
      default: "08:00"
      selector:
        time:
    end_time:
      name: End Time
      description: Time when the schedule ends (HH:MM format)
      required: false
      default: "22:00"
      selector:
        time:
    days:
      name: Days of Week
      description: Days when the schedule is active (1=Sunday, 2=Monday, ..., 7=Saturday)
      required: false
      default: [2, 3, 4, 5, 6]
      selector:
        select:
          multiple: true
          options:
            - label: "Sunday"
              value: 1
            - label: "Monday"
              value: 2
            - label: "Tuesday"
              value: 3
            - label: "Wednesday"
              value: 4
            - label: "Thursday"
              value: 5
            - label: "Friday"
              value: 6
            - label: "Saturday"
              value: 7
    intensity:
      name: Intensity
      description: Fragrance intensity level (1-10)
      required: false
      default: 5
      selector:
        number:
          min: 1
          max: 10
    active:
      name: Active
      description: Whether the schedule is active
      required: false
      default: true
      selector:
        boolean:

update_schedule:
  name: Update Schedule
  description: Update an existing schedule.
  target:
    entity:
      integration: aera
      domain: fan
  fields:
    schedule_key:
      name: Schedule Key
      description: The unique key of the schedule to update
      required: true
      selector:
        number:
          mode: box
    schedule_name:
      name: Schedule Name
      description: New display name for the schedule
      required: false
      selector:
        text:
    start_time:
      name: Start Time
      description: New start time (HH:MM format)
      required: false
      selector:
        time:
    end_time:
      name: End Time
      description: New end time (HH:MM format)
      required: false
      selector:
        time:
    days:
      name: Days of Week
      description: New days when the schedule is active
      required: false
      selector:
        select:
          multiple: true
          options:
            - label: "Sunday"
              value: 1
            - label: "Monday"
              value: 2
            - label: "Tuesday"
              value: 3
            - label: "Wednesday"
              value: 4
            - label: "Thursday"
              value: 5
            - label: "Friday"
              value: 6
            - label: "Saturday"
              value: 7
    intensity:
      name: Intensity
      description: New intensity level (1-10)
      required: false
      selector:
        number:
          min: 1
          max: 10
    active:
      name: Active
      description: Whether the schedule should be active
      required: false
      selector:
        boolean:

delete_schedule:
  name: Delete Schedule
  description: Delete a schedule.
  target:
    entity:
      integration: aera
      domain: fan
  fields:
    schedule_key:
      name: Schedule Key
      description: The unique key of the schedule to delete
      required: true
      selector:
        number:
          mode: box

toggle_schedule:
  name: Toggle Schedule
  description: Enable or disable a schedule.
  target:
    entity:
      integration: aera
      domain: fan
  fields:
    schedule_key:
      name: Schedule Key
      description: The unique key of the schedule to toggle
      required: true
      selector:
        number:
          mode: box
    active:
      name: Active
      description: Whether the schedule should be active
      required: true
      selector:
        boolean:
