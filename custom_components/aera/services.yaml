start_session:
  target:
    entity:
      integration: aera
      domain: fan
  fields:
    duration:
      required: true
      selector:
        select:
          options:
            - label: "2 hours"
              value: "2h"
            - label: "4 hours"
              value: "4h"
            - label: "8 hours"
              value: "8h"

stop_session:
  target:
    entity:
      integration: aera
      domain: fan

set_intensity:
  target:
    entity:
      integration: aera
      domain: fan
  fields:
    intensity:
      required: true
      selector:
        number:
          min: 1
          max: 10
          mode: slider

set_fragrance:
  target:
    entity:
      integration: aera
      domain: fan
  fields:
    fragrance_id:
      required: true
      example: "IDG"
      selector:
        text:

set_room_name:
  target:
    entity:
      integration: aera
      domain: fan
  fields:
    room_name:
      required: true
      example: "Living Room"
      selector:
        text:

refresh_schedules:
  target:
    entity:
      integration: aera
      domain: fan

create_schedule:
  target:
    entity:
      integration: aera
      domain: fan
  fields:
    schedule_name:
      required: true
      example: "Morning"
      selector:
        text:
    start_time:
      default: "08:00"
      selector:
        time:
    end_time:
      default: "22:00"
      selector:
        time:
    days:
      default: [2, 3, 4, 5, 6]
      selector:
        select:
          multiple: true
          options:
            - label: "Sunday"
              value: 1
            - label: "Monday"
              value: 2
            - label: "Tuesday"
              value: 3
            - label: "Wednesday"
              value: 4
            - label: "Thursday"
              value: 5
            - label: "Friday"
              value: 6
            - label: "Saturday"
              value: 7
    intensity:
      default: 5
      selector:
        number:
          min: 1
          max: 10
    active:
      default: true
      selector:
        boolean:

update_schedule:
  target:
    entity:
      integration: aera
      domain: fan
  fields:
    schedule_key:
      required: true
      selector:
        number:
          mode: box
    schedule_name:
      selector:
        text:
    start_time:
      selector:
        time:
    end_time:
      selector:
        time:
    days:
      selector:
        select:
          multiple: true
          options:
            - label: "Sunday"
              value: 1
            - label: "Monday"
              value: 2
            - label: "Tuesday"
              value: 3
            - label: "Wednesday"
              value: 4
            - label: "Thursday"
              value: 5
            - label: "Friday"
              value: 6
            - label: "Saturday"
              value: 7
    intensity:
      selector:
        number:
          min: 1
          max: 10
    active:
      selector:
        boolean:

delete_schedule:
  target:
    entity:
      integration: aera
      domain: fan
  fields:
    schedule_key:
      required: true
      selector:
        number:
          mode: box

toggle_schedule:
  target:
    entity:
      integration: aera
      domain: fan
  fields:
    schedule_key:
      required: true
      selector:
        number:
          mode: box
    active:
      required: true
      selector:
        boolean:
